name: Backend — Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - "pilot/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.BACKEND_ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.BACKEND_ECS_SERVICE }}
  ECS_TASK_DEFINITION_FAMILY: ${{ secrets.BACKEND_TASK_DEFINITION_FAMILY }}
  CONTAINER_NAME: ${{ secrets.BACKEND_CONTAINER_NAME }}

jobs:
  build-and-deploy:
    name: Build → Push ECR → Deploy ECS
    runs-on: ubuntu-latest
    # Only run on push to main; workflow_dispatch always runs.
    # Prevents accidental deploys from forks.
    permissions:
      id-token: write   # needed if you switch to OIDC auth (recommended later)
      contents: read

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials ─────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. Log in to Amazon ECR ──────────────────────────────────────────────
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build, tag, and push Docker image ─────────────────────────────────
      # The image is tagged with both the short git SHA (immutable, for rollback)
      # and "latest" (used by ECS task definition as a mutable pointer).
      - name: Build and push backend image
        id: build-image
        working-directory: pilot
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build \
            --tag "$IMAGE_URI" \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      # ── 5. Download current ECS task definition ───────────────────────────────
      # We download the live definition so we don't have to store it in the repo —
      # only the image URI changes; all other settings (memory, env vars from
      # Secrets Manager, IAM roles, etc.) are preserved as-is.
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_DEFINITION_FAMILY" \
            --query taskDefinition \
            --output json > task-definition.json

      # ── 6. Inject new image into the task definition ──────────────────────────
      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      # ── 7. Register updated task definition and update ECS service ────────────
      # --wait-for-service-stability blocks the workflow until the new tasks are
      # running and healthy (uses ECS service health checks).
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
