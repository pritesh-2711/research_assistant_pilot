name: Frontend — Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - "ai_assistant_ui/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  build-and-deploy:
    name: Build → Upload S3 → Invalidate CloudFront
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ai_assistant_ui/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        working-directory: ai_assistant_ui
        run: npm ci

      # ── 4. Build Vite bundle ──────────────────────────────────────────────────
      # VITE_API_BASE_URL is baked into the JS bundle at build time.
      # In production this is the full backend URL (e.g. https://api.yourdomain.com).
      # The value comes from a GitHub secret so it never appears in the repo.
      - name: Build frontend
        working-directory: ai_assistant_ui
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      # ── 5. Configure AWS credentials ─────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 6. Upload build output to S3 ──────────────────────────────────────────
      # --delete removes files from S3 that were deleted locally (keeps bucket clean).
      # Cache-Control:
      #   - HTML files: no-cache so browsers always get fresh SPA entry point
      #   - JS/CSS/assets: 1 year (safe because Vite content-hashes filenames)
      - name: Sync build to S3
        run: |
          # Upload hashed assets with long cache
          aws s3 sync ai_assistant_ui/dist/ "s3://$S3_BUCKET/" \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

          # Upload index.html with no-cache so SPA always fetches the latest entry
          aws s3 cp ai_assistant_ui/dist/index.html "s3://$S3_BUCKET/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      # ── 7. Invalidate CloudFront cache ────────────────────────────────────────
      # Only index.html needs invalidating — all other files are content-hashed
      # so new deployments use new filenames automatically.
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/index.html"
